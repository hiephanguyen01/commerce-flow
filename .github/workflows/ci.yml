name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: commerce_flow_test
          POSTGRES_USER: commerce
          POSTGRES_PASSWORD: commerce_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U commerce -d commerce_flow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://commerce:commerce_test_password@localhost:5432/commerce_flow_test?schema=public
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: test
      MINIO_SECRET_KEY: test
      SMTP_HOST: localhost
      SMTP_PORT: 1025

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @commerce-flow/api prisma:validate

      - name: Generate Prisma Client
        run: pnpm --filter @commerce-flow/api prisma:generate

      - name: Check formatting
        run: pnpm format:check

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build applications
        run: pnpm build
