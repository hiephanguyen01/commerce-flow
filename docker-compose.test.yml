services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: commerce_test
      POSTGRES_PASSWORD: commerce_test
      POSTGRES_DB: commerce_test
    ports:
      - '55432:5432'
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U commerce_test
      interval: 2s
      timeout: 2s
      retries: 20

  redis-test:
    image: redis:8-alpine
    ports:
      - '56379:6379'
    command:
      - redis-server
      - --save
      - ''
      - --appendonly
      - 'no'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 2s
      timeout: 2s
      retries: 20
