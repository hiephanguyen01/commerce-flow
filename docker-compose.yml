name: commerce-flow

services:
  postgres:
    image: postgres:17-alpine
    container_name: commerce-flow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerce_flow
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce_local_password
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U commerce -d commerce_flow']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: commerce-flow-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - 'yes'
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: commerce-flow-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  minio:
    image: minio/minio:latest
    container_name: commerce-flow-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: commerce
      MINIO_ROOT_PASSWORD: commerce_local_password
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
